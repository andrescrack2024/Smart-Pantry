server {
    listen 80;
    server_name smartpantry.com www.smartpantry.com;

    # Ruta donde se ubicarán los archivos compilados del dist de Smart Pantry
    root /var/www/smart-pantry/dist;
    index index.html;

    # Enrutamiento para Single Page Application (React Native / Expo Web)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión Gzip para optimización en redes móviles 3G
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/xml+rss;

    error_page 404 /index.html;
}
